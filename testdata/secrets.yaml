version: 1
provider: aws-secretsmanager
secrets:
  - key: /dev1/networking/bgp_auth_key
    value: "example-secret-value"
    description: "BGP auth key"
    encryption_key: "arn:aws:kms:eu-central-1:000000000000:key/example-key"
    tags:
      environment: dev1
      owner: platform

  - key: /dev1/github/webhook_secret
    value: "another-secret-value"
    description: "GitHub webhook secret"
    encryption_key: "alias/aws/secretsmanager"
    tags:
      environment: dev1
      owner: platform
