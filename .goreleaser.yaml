project_name: secrets-syncer

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/secrets-syncer
    binary: secrets-syncer
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/jkarkoszka/secrets-syncer/internal/cli.Version={{.Version}}

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
